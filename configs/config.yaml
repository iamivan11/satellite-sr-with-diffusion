# Root Hydra config.
#
# Compose a run by selecting a `data` (dataset + resolution) and a `model`
# (architecture). Everything else has sensible defaults that can be overridden
# on the command line. Examples:
#
#   python main.py data=sen2venus_4x model=wave
#   python main.py data=sen2venus_3x model=sr3 phase=val path.resume_state=/path/to/ckpt
#   python main.py data=custom hr_size=128 \
#       datasets.train.dataroot=/path/to/your_dataset/train datasets.val.dataroot=/path/to/your_dataset/val
#
# Any dataset works as long as each split is a folder with `hr/` and `lr/`
# subfolders of matching, index-aligned images (see README "Datasets").

defaults:
  - data: sen2venus_4x
  - model: wave
  - _self_
  - override hydra/job_logging: disabled # let the project configure logging
  - override hydra/hydra_logging: disabled

# Auto experiment name, e.g. "sen2venus_4x_wave". Override with name=...
name: ${dataset_name}_${scale}_${model.which_model_G}

phase: train # train | val
gpu_ids: [0] # CUDA GPU id(s); auto-falls back to MPS/CPU when CUDA is unavailable
val_upsampler: model # model | bicubic | lanczos  (baselines bypass the model)

path:
  log: logs
  results: results/${name}
  checkpoint: checkpoint
  resume_state: null # checkpoint to resume training from / load for evaluation

train:
  n_iter: 200000
  val_freq: 10000
  save_checkpoint_freq: 10000
  print_freq: 500
  optimizer:
    type: adamw
    lr: 5.0e-5
    weight_decay: 0.0001
  gradient_clipping: true
  clip_value: 1.0
  use_lpips: false
  lpips_weight: 0.05

wandb:
  project: ${name}
  enable: false

hydra:
  run:
    dir: .
  output_subdir: null
